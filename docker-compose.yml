version: '3.8'

services:
  db:
    image: postgres:16
    container_name: mybsu-db
    restart: always
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - app-network

  backend:
    build: ./backend
    container_name: mybsu-backend
    restart: always
    ports:
      - "${SERVER_PORT}:${SERVER_PORT}"
    depends_on:
      - db
    environment:
      DB_HOST: ${DB_HOST}
      DB_PORT: ${DB_PORT}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_NAME: ${DB_NAME}
      SERVER_PORT: ${SERVER_PORT}
      ALLOWED_ORIGIN: ${ALLOWED_ORIGIN}
    networks:
      - app-network

  frontend:
    build: ./frontend
    container_name: mybsu-frontend
    restart: always
    ports:
      - "${FRONTEND_PORT}:5173"
    environment:
      - VITE_SERVER_URL=http://localhost:${SERVER_PORT}
    volumes:
      - ./frontend:/app
      - /app/node_modules
    networks:
      - app-network

networks:
  app-network:
    driver: bridge

volumes:
  postgres_data:
